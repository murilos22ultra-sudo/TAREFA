<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>TAREFAS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ CSS carregado corretamente -->
  <link rel="stylesheet" href="style.css<h1>TAREFAS</h1>
  <div class="header-actions">
    <button class="btn blue" id="btnNovo">+ Criar tarefa</button>
    <button class="btn green" id="btnExport">Exportar Excel</button>
  </div>
</header>

<main class="kanban">
  <div class="coluna" data-status="A Fazer">
    <h2>A Fazer</h2>
  </div>

  <div class="coluna" data-status="Em Progresso">
    <h2>Em Progresso</h2>
  </div>

  <div class="coluna" data-status="Concluído">
    <h2>Concluído</h2>
  </div>
</main>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Cadastrar atividade</h3>

    <input id="taskTitle" placeholder="Título" />
    <textarea id="taskDesc" placeholder="Descrição"></textarea>
    <input id="taskDate" type="date" />

    <select id="taskPriority">
      <option>Alta</option>
      <option selected>Média</option>
      <option>Baixa</option>
    </select>

    <div class="check-row">
      <input id="checkInput" placeholder="Item do checklist" />
      <button class="btn gray" id="addCheck">Adicionar</button>
    </div>

    <div id="checkPreview"></div>

    <div class="modal-actions">
      <button class="btn gray" id="cancel">Cancelar</button>
      <button class="btn blue" id="save">Salvar</button>
    </div>
  </div>
</div>

<!-- ✅ JS carregado corretamente NO FINAL -->
script.js</script>

</body>
</html>
