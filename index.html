<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Salvar</title>
</head>
<body>

<button id="abrir">Abrir</button>

<div id="modal" style="display:none; border:1px solid #000; padding:10px;">
  <input id="titulo" placeholder="Título">
  <button id="salvar">Salvar</button>
</div>

<script>
document.getElementById("abrir").addEventListener("click", () => {
  document.getElementById("modal").style.display = "block";
});

document.getElementById("salvar").addEventListener("click", (e) => {
  e.preventDefault();
  alert("SALVAR FUNCIONOU ✅");
});
</script>

</body>
</html>
