<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kanban</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    header {
      padding: 16px 24px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    .kanban {
      display: flex;
      gap: 16px;
      padding: 24px;
    }

    .coluna {
      background: #111827;
      padding: 16px;
      border-radius: 8px;
      width: 33%;
      min-height: 200px;
    }

    .card {
      background: #1f2937;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden {
      display: none;
    }

    .modal-box {
      background: #020617;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
    }

    .modal-box input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 4px;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <h1>TAREFAS</h1>
  <button id="btnAbrir">+ Criar tarefa</button>
</header>

<div class="kanban">
  <div class="coluna" id="colA">
    <h3>A Fazer</h3>
  </div>
  <div class="coluna">
    <h3>Em Progresso</h3>
  </div>
  <div class="coluna">
    <h3>Concluído</h3>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Criar tarefa</h3>

    <input id="inputTitulo" placeholder="Título da tarefa">

    <div style="display:flex; gap:8px;">
      <button id="btnCancelar" style="background:#374151;">Cancelar</button>
      <button id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const btnAbrir = document.getElementById("btnAbrir");
  const btnCancelar = document.getElementById("btnCancelar");
  const btnSalvar = document.getElementById("btnSalvar");
  const modal = document.getElementById("modal");
  const inputTitulo = document.getElementById("inputTitulo");
  const colA = document.getElementById("colA");

  btnAbrir.addEventListener("click", () => {
    inputTitulo.value = "";
    modal.classList.remove("hidden");
  });

  btnCancelar.addEventListener("click", () => {
    modal.classList.add("hidden");
  });

  btnSalvar.addEventListener("click", () => {
    const titulo = inputTitulo.value.trim();

    if (!titulo) {
      alert("Digite um título");
      return;
    }

    const card = document.createElement("div");
    card.className = "card";
    card.textContent = titulo;

    colA.appendChild(card);
    modal.classList.add("hidden");
  });

});
</script>

</body>
</html>
