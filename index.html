<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tarefas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>TAREFAS</h1>
  <button class="btn-primary" onclick="abrirModal()">+ Criar tarefa</button>
</header>

<main class="kanban">
  <div class="coluna" data-status="A Fazer">
    <h2>A Fazer</h2>
    <div class="cards"></div>
  </div>

  <div class="coluna" data-status="Em Progresso">
    <h2>Em Progresso</h2>
    <div class="cards"></div>
  </div>

  <div class="coluna" data-status="Concluído">
    <h2>Concluído</h2>
    <div class="cards"></div>
  </div>
</main>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Criar tarefa</h3>

    <input id="titulo" placeholder="Título da tarefa">

    <select id="prioridade">
      <option value="Alta">Alta</option>
      <option value="Média" selected>Média</option>
      <option value="Baixa">Baixa</option>
    </select>

    <div class="check-row">
      <input id="check-item" placeholder="Item do checklist">
      <button onclick="addChecklist()">+</button>
    </div>

    <ul id="lista-checklist"></ul>

    <div class="modal-actions">
      <button onclick="fecharModal()">Cancelar</button>
      <button class="btn-primary" onclick="criarTarefa()">Adicionar tarefa</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
