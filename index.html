<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TAREFAS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

/* ===== BACKGROUND ===== */
body {
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1324, #05070f);
  color: #e5e7eb;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 32px;
}

header h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 700;
}

.btn-primary {
  background: #2563eb;
  border: none;
  color: white;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.btn-primary:hover {
  background: #1d4ed8;
}

/* ===== KANBAN ===== */
.kanban {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  padding: 24px 32px;
}

/* ===== COLUNAS ===== */
.coluna {
  background: linear-gradient(180deg, #111827, #0b1324);
  border-radius: 16px;
  padding: 16px;
  min-height: 300px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.coluna h3 {
  margin: 0 0 12px;
  font-size: 15px;
  font-weight: 600;
}

/* ===== CARD ===== */
.card {
  background: linear-gradient(180deg, #1f2937, #111827);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 6px 16px rgba(0,0,0,0.45);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  border-left: 4px solid #facc15;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.6);
}

/* ===== MODAL ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
}

.hidden {
  display: none;
}

.modal-box {
  background: #020617;
  border-radius: 14px;
  padding: 24px;
  width: 320px;
}

.modal-box h3 {
  margin-top: 0;
  margin-bottom: 12px;
}

.modal-box input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 12px;
  background: #111827;
  color: #e5e7eb;
}

.modal-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.btn-secondary {
  background: #374151;
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>TAREFAS</h1>
  <button id="btnAbrir" class="btn-primary">+ Criar tarefa</button>
</header>

<main class="kanban">
  <div class="coluna" id="colA">
    <h3>A Fazer</h3>
  </div>
  <div class="coluna">
    <h3>Em Progresso</h3>
  </div>
  <div class="coluna">
    <h3>Concluído</h3>
  </div>
</main>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Criar tarefa</h3>

    <input id="inputTitulo" placeholder="Título da tarefa">

    <div class="modal-actions">
      <button id="btnCancelar" class="btn-secondary">Cancelar</button>
      <button id="btnSalvar" class="btn-primary">Salvar</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const btnAbrir = document.getElementById("btnAbrir");
  const btnCancelar = document.getElementById("btnCancelar");
  const btnSalvar = document.getElementById("btnSalvar");
  const modal = document.getElementById("modal");
  const inputTitulo = document.getElementById("inputTitulo");
  const colA = document.getElementById("colA");

  btnAbrir.addEventListener("click", () => {
    inputTitulo.value = "";
    modal.classList.remove("hidden");
  });

  btnCancelar.addEventListener("click", () => {
    modal.classList.add("hidden");
  });

  btnSalvar.addEventListener("click", () => {
    const titulo = inputTitulo.value.trim();

    if (!titulo) {
      alert("Digite um título");
      return;
    }

    const card = document.createElement("div");
    card.className = "card";
    card.textContent = titulo;

    colA.appendChild(card);
    modal.classList.add("hidden");
  });

});
</script>

</body>
</html>
