<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Kanban Trello Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Kanban de Tarefas</h1>
</header>

<section class="new-task">
  <input id="titulo" placeholder="Título da tarefa">

  <select id="prioridade">
    <option value="Alta">Alta</option>
    <option value="Média" selected>Média</option>
    <option value="Baixa">Baixa</option>
  </select>

  <div class="check-input">
    <input id="check-item" placeholder="Item do checklist">
    <button onclick="addChecklistTemp()">+</button>
  </div>

  <ul id="lista-checklist"></ul>

  <button class="btn-primary" onclick="criarTarefa()">Adicionar tarefa</button>
</section>

<main class="kanban">
  <div class="coluna" data-status="A Fazer">
    <h2>A Fazer</h2>
    <div class="cards"></div>
  </div>

  <div class="coluna" data-status="Em Progresso">
    <h2>Em Progresso</h2>
    <div class="cards"></div>
  </div>

  <div class="coluna" data-status="Concluído">
    <h2>Concluído</h2>
    <div class="cards"></div>
  </div>
</main>

<footer>
  <button onclick="exportarCSV()">Exportar CSV</button>
</footer>

<script src="script.js"></script>
</body>
</html>
